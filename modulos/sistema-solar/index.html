<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🪐 Sistema Solar | Aprende Jugando</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- PORTAL DE LANZAMIENTO -->
    <div id="portal-lanzamiento">
        <div id="fondo-espacial">
            <div class="estrella" style="--delay:0s; --top:10%; --left:20%; --size:2px;"></div>
            <div class="estrella" style="--delay:2s; --top:25%; --left:70%; --size:3px;"></div>
            <div class="estrella" style="--delay:4s; --top:50%; --left:15%; --size:1.5px;"></div>
            <div class="estrella" style="--delay:6s; --top:70%; --left:80%; --size:2.5px;"></div>
            <div class="estrella" style="--delay:3s; --top:85%; --left:40%; --size:2px;"></div>
            <div class="estrella" style="--delay:7s; --top:15%; --left:50%; --size:1.8px;"></div>
            <div class="estrella" style="--delay:1s; --top:40%; --left:90%; --size:2.2px;"></div>
            <div class="estrella" style="--delay:5s; --top:60%; --left:5%; --size:1.5px;"></div>
            <div class="estrella" style="--delay:8s; --top:90%; --left:60%; --size:2px;"></div>
            <div class="estrella" style="--delay:2.5s; --top:5%; --left:85%; --size:1.8px;"></div>
            <div class="estrella-fugaz"></div>
        </div>

        <div id="polvo-espacial"></div>

        <div id="menu-lanzamiento">
            <a href="../../../categorias/ciencias/index.html" class="btn-volver">← Volver al laboratorio</a>

            <div class="header-espacial">
                <div class="emblema">🪐</div>
                <h1>Portal al <span>Sistema Solar</span></h1>
                <p>Prepárate para despegar</p>
            </div>

            <button id="btn-lanzamiento" class="btn-lanzamiento">
                <div class="btn-contenido">
                    <span class="btn-icono">🚀</span>
                    <span class="btn-texto">Iniciar viaje</span>
                    <span class="btn-subtexto">Explora planetas, lunas y anillos</span>
                </div>
                <div class="btn-onda"></div>
                <div class="btn-onda" style="animation-delay: 0.5s;"></div>
                <div class="btn-onda" style="animation-delay: 1s;"></div>
            </button>

            <p class="footer">🌌 Aprende Jugando · Proyecto educativo interactivo</p>
        </div>
    </div>

    <!-- EXPERIENCIA 3D -->
    <div id="experiencia-3d">
        <div id="canvas-container"></div>

        <div id="reproductor-estelar" class="music-player">
            <div class="track-info">
                <span id="player-titulo">Sintonía Cósmica</span>
            </div>
            <div class="player-controls">
                <button id="btn-prev" class="player-btn">⏮</button>
                <button id="btn-play-pause" class="player-btn">▶</button>
                <button id="btn-next" class="player-btn">⏭</button>
            </div>
        </div>

        <div class="mobile-controls">
            <button id="btn-acercar" class="ctrl-btn" title="Acercar">🔍</button>
            <button id="btn-alejar" class="ctrl-btn" title="Alejar">🔎</button>
            <button id="btn-reset-vista" class="ctrl-btn" title="Vista inicial">🏠</button>
        </div>

        <div id="modal-planeta" class="oculto">
            <div class="contenido-modal">
                <span id="btn-cerrar">&times;</span>
                <div id="cuerpo-modal"></div>
            </div>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.min.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script>
        // Generar polvo espacial
        (function() {
            const contenedor = document.getElementById('polvo-espacial');
            for (let i = 0; i < 60; i++) {
                const particula = document.createElement('div');
                particula.className = 'polvo';
                particula.style.left = Math.random() * 100 + '%';
                particula.style.top = Math.random() * 100 + '%';
                particula.style.width = (1 + Math.random() * 3) + 'px';
                particula.style.height = particula.style.width;
                particula.style.animationDelay = Math.random() * 5 + 's';
                particula.style.animationDuration = (3 + Math.random() * 4) + 's';
                particula.style.opacity = 0.1 + Math.random() * 0.3;
                contenedor.appendChild(particula);
            }
        })();

        // 🔥 PRECARGA INTELIGENTE: cargar texturas en segundo plano
        let texturasPrecargadas = false;
        setTimeout(() => {
            if (!texturasPrecargadas) {
                import('./js/sistema-solar.js')
                    .then(() => {
                        console.log('📦 Texturas precargadas en segundo plano');
                        texturasPrecargadas = true;
                    })
                    .catch(() => {
                        // Silencio: si falla, no importa, se cargarán al hacer clic
                    });
            }
        }, 1500);

        // Botón de lanzamiento
        document.getElementById('btn-lanzamiento').addEventListener('click', function() {
            const portal = document.getElementById('portal-lanzamiento');
            portal.style.opacity = '0';
            portal.style.pointerEvents = 'none';
            
            setTimeout(() => {
                portal.style.display = 'none';
                const experiencia = document.getElementById('experiencia-3d');
                experiencia.style.opacity = '1';
                experiencia.style.pointerEvents = 'auto';
                
                // Cargar main.js (si ya estaba precargado, será instantáneo)
                import('./js/main.js')
                    .then(() => {
                        console.log('🚀 Sistema Solar cargado correctamente');
                    })
                    .catch((error) => {
                        console.error('❌ Error al cargar el sistema solar:', error);
                    });
            }, 800);
        });
    </script>

    <!-- Carga directa de main.js (como antes) -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
